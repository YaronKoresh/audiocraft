[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "audiocraft"
version = "1.3.0"
description = 'Audio generation research library for PyTorch'
authors = [
  {name = "FAIR Speech & Audio"},
  {email = "defossez@meta.com"},
  {email = "jadecopet@meta.com"}
]
license = {text = 'MIT License'}
requires-python = '>=3.8.0'
dependencies = [
  "av==11.0.0",
  "einops",
  "flashy>=0.0.1",
  "hydra-core>=1.0.7,<1.1",
  "hydra_colorlog",
  "julius",
  "num2words",
  "numpy<2.0.0",
  "sentencepiece",
  "spacy>=3.6.1",
  "torch==2.4.0+cu121",
  "torchaudio==2.4.0+cu121",
  "huggingface_hub",
  "tqdm",
  "transformers>=4.31.0",
  "xformers>=0.0.23",
  "demucs",
  "librosa",
  "soundfile",
  "gradio",
  "torchmetrics",
  "encodec",
  "protobuf",
  "torchvision==0.19.0+cu121",
  "torchtext==0.16.0",
  "pesq",
  "pystoi"
]
